services:
  postgres:
    image: postgres:16-alpine
    container_name: bbsachieve-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bbsachieve
    ports:
      - "5433:5432"
    volumes:
      - bbsachieve-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bbsachieve"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bbsachieve-postgres-data:
